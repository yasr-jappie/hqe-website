<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Home of Quranic Excellence</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <!-- Responsive Navbar -->
    <nav class="bg-white shadow-sm border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">
                <div class="flex items-center">
                    <a href="index.html" class="text-2xl font-bold text-emerald-800 tracking-tight">Home of Quranic Excellence</a>
                </div>
                
                <!-- Desktop Menu (Hidden on mobile) -->
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-slate-600 hover:text-emerald-700 font-medium transition">Home</a>
                    <a href="about.html" class="text-slate-600 hover:text-emerald-700 font-medium transition">About Us</a>
                    <a href="contact.html" class="bg-emerald-700 text-white px-6 py-2 rounded-md font-medium hover:bg-emerald-800 transition shadow-sm">Contact Us</a>
                </div>

                <!-- Mobile Hamburger Button (Hidden on desktop) -->
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-button" class="text-slate-600 hover:text-emerald-700 focus:outline-none">
                        <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Dropdown Menu (Initially hidden) -->
        <div id="mobile-menu" class="hidden md:hidden bg-slate-50 border-t border-slate-200">
            <div class="px-4 pt-2 pb-4 space-y-2 shadow-inner">
                <a href="index.html" class="block px-3 py-2 rounded-md text-base font-medium text-slate-700 hover:text-emerald-700 hover:bg-emerald-50">Home</a>
                <a href="about.html" class="block px-3 py-2 rounded-md text-base font-medium text-slate-700 hover:text-emerald-700 hover:bg-emerald-50">About Us</a>
                <a href="contact.html" class="block px-3 py-2 mt-4 text-center rounded-md text-base font-medium bg-emerald-700 text-white hover:bg-emerald-800">Contact Us</a>
            </div>
        </div>
    </nav>

    <!-- Contact Section -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
            
            <!-- Contact Information -->
            <div>
                <h1 class="text-4xl font-extrabold text-slate-900 mb-6">Get in Touch</h1>
                <p class="text-lg text-slate-600 mb-8">Have questions about admissions, curriculum, or visiting the school? We would love to hear from you.</p>
                
                <div class="space-y-6 text-slate-600">
                    <div class="flex items-start">
                        <div class="ml-4">
                            <p class="font-semibold text-slate-900">Address</p>
                            <p>123 Education Way<br>Cape Town, 8000</p>
                        </div>
                    </div>
                    <div class="flex items-start">
                        <div class="ml-4">
                            <p class="font-semibold text-slate-900">Phone</p>
                            <p>+27 21 555 0123</p>
                        </div>
                    </div>
                    <div class="flex items-start">
                        <div class="ml-4">
                            <p class="font-semibold text-slate-900">Email</p>
                            <p>info@madrasahexcellence.co.za</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-8">
                <form action="#" method="POST" class="space-y-6">
                    <div>
                        <label for="name" class="block text-sm font-medium text-slate-700">Full Name</label>
                        <input type="text" id="name" name="name" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500 sm:text-sm border p-3" placeholder="Ahmad Doe">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-700">Email Address</label>
                        <input type="email" id="email" name="email" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500 sm:text-sm border p-3" placeholder="ahmad@example.com">
                    </div>
                    <div>
                        <label for="message" class="block text-sm font-medium text-slate-700">Message</label>
                        <textarea id="message" name="message" rows="4" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500 sm:text-sm border p-3" placeholder="How can we help you?"></textarea>
                    </div>
                    <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-emerald-700 hover:bg-emerald-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition">
                        Send Message
                    </button>
                </form>
            </div>
        </div>
    </main>

    <!-- Mobile Menu Script -->
    <script src="assets/js/main.js"></script>
</body>
</html>
