<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home of Quranic Excellence</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <!-- Responsive Navbar -->
    <nav class="bg-white shadow-sm border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">
                <div class="flex items-center">
                    <!-- Placeholder Logo -->
                    <span class="text-2xl font-bold text-emerald-800 tracking-tight">Home of Quranic Excellence</span>
                </div>
                <!-- Desktop Menu (Hidden on mobile) -->
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-slate-600 hover:text-emerald-700 font-medium transition">Home</a>
                    <a href="about.html" class="text-slate-600 hover:text-emerald-700 font-medium transition">About Us</a>
                    <a href="contact.html" class="bg-emerald-700 text-white px-6 py-2 rounded-md font-medium hover:bg-emerald-800 transition shadow-sm">Enroll Now</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section (Mobile-first responsive) -->
    <header class="relative bg-white overflow-hidden">
        <div class="max-w-7xl mx-auto">
            <div class="relative z-10 pb-8 bg-white sm:pb-16 md:pb-20 lg:max-w-2xl lg:w-full lg:pb-28 xl:pb-32 pt-10 sm:pt-16 lg:pt-20 px-4 sm:px-6 lg:px-8">
                
                <div class="sm:text-center lg:text-left">
                    <h1 class="text-4xl tracking-tight font-extrabold text-slate-900 sm:text-5xl md:text-6xl">
                        <span class="block">Nurturing minds with</span>
                        <span class="block text-emerald-700">Islamic Values</span>
                    </h1>
                    <p class="mt-3 text-base text-slate-500 sm:mt-5 sm:text-lg sm:max-w-xl sm:mx-auto md:mt-5 md:text-xl lg:mx-0">
                        We provide a comprehensive educational environment that balances academic excellence with deep-rooted spiritual growth for the next generation.
                    </p>
                    <div class="mt-5 sm:mt-8 sm:flex sm:justify-center lg:justify-start">
                        <div class="rounded-md shadow">
                            <a href="about.html" class="w-full flex items-center justify-center px-8 py-3 border border-transparent text-base font-medium rounded-md text-white bg-emerald-700 hover:bg-emerald-800 md:py-4 md:text-lg transition">
                                Discover Our Curriculum
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Decorative background area for large screens -->
        <div class="lg:absolute lg:inset-y-0 lg:right-0 lg:w-1/2 bg-slate-100 hidden lg:block">
            <!-- You would place a high-quality image of the school or students here -->
            <div class="h-full w-full bg-slate-200 border-l border-slate-300 flex items-center justify-center text-slate-400">
                [High-Quality School Image Placeholder]
            </div>
        </div>
    </header>

</body>
</html>
